<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Guidance Quiz</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f0f4f7; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .box { background: #fff; padding: 36px 32px; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 360px; }
    h2 { color: #192D38; margin: 0 0 6px; }
    p { color: #666; font-size: 14px; margin: 0 0 24px; }
    input { width: 100%; padding: 10px 12px; border: 1.5px solid #ddd; border-radius: 6px; font-size: 15px; box-sizing: border-box; margin-bottom: 12px; }
    button { width: 100%; padding: 11px; background: #192D38; color: #fff; border: none; border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer; }
    button:hover { background: #243d4d; }
    .error { background: #fdecea; color: #c0392b; padding: 10px 12px; border-radius: 6px; font-size: 14px; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div class="box">
    <h2>🔐 Admin Login</h2>
    <p>AtkinsRealis Guidance Quiz — Question Manager</p>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="POST" action="/admin/login">
      <input type="password" name="password" placeholder="Admin password" autofocus required />
      <button type="submit">Login</button>
    </form>
  </div>
</body>
</html>
